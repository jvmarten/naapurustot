name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Check bundle size (IN-3)
        run: |
          # Exclude maplibre (large, irreducible third-party map renderer)
          JS_SIZE=$(find dist/assets -name '*.js' ! -name 'maplibre-*' -exec gzip -c {} \; | wc -c)
          echo "App JS bundle excluding maplibre (gzipped): $JS_SIZE bytes"
          # Fail if app JS bundle exceeds 150KB gzipped
          if [ "$JS_SIZE" -gt 153600 ]; then
            echo "::error::JS bundle size exceeds 150KB gzipped budget ($JS_SIZE bytes)"
            exit 1
          fi
