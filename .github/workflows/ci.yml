name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    # Skip CI on PRs from claude/* branches — auto-merge.yml already runs the full suite
    if: github.event_name == 'push' || !startsWith(github.head_ref, 'claude/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npx playwright test --project=e2e
        timeout-minutes: 5

      - name: Visual regression tests
        id: visual-tests
        run: |
          SNAP_DIR="e2e/visual/visual-regression.spec.ts-snapshots"
          if [ -d "$SNAP_DIR" ] && ls "$SNAP_DIR"/*-visual-linux.png >/dev/null 2>&1; then
            echo "Baselines exist — running comparison"
            npm run test:visual
          else
            echo "No baselines — generating snapshots"
            npm run test:visual -- --update-snapshots || true
            npm run test:visual
          fi

      - name: Upload visual diff artifacts
        if: failure() && steps.visual-tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: |
            test-results/
            e2e/visual/visual-regression.spec.ts-snapshots/*-diff.png
            e2e/visual/visual-regression.spec.ts-snapshots/*-actual.png
          retention-days: 14

      - name: Check bundle size (IN-3)
        run: |
          # Exclude maplibre (large, irreducible third-party map renderer)
          JS_SIZE=$(find dist/assets -name '*.js' ! -name 'maplibre-*' -exec gzip -c {} \; | wc -c)
          echo "App JS bundle excluding maplibre (gzipped): $JS_SIZE bytes"
          # Fail if app JS bundle exceeds 210KB gzipped
          # Budget raised from 160KB → 210KB after react-router-dom + @turf/union
          # (mandatory per CLAUDE.md) + auth/profile feature work landed on main.
          if [ "$JS_SIZE" -gt 215040 ]; then
            echo "::error::JS bundle size exceeds 210KB gzipped budget ($JS_SIZE bytes)"
            exit 1
          fi

      - name: Measure bundle sizes (IN-4)
        id: bundle-size
        run: |
          JS_SIZE=$(find dist/assets -name '*.js' ! -name 'maplibre-*' -exec gzip -c {} \; | wc -c)
          CSS_SIZE=$(find dist/assets -name '*.css' -exec gzip -c {} \; | wc -c)
          TOTAL=$((JS_SIZE + CSS_SIZE))
          echo "js_size=$JS_SIZE" >> "$GITHUB_OUTPUT"
          echo "css_size=$CSS_SIZE" >> "$GITHUB_OUTPUT"
          echo "total_size=$TOTAL" >> "$GITHUB_OUTPUT"
          # Persist for main branch caching
          printf '{"js":%d,"css":%d,"total":%d}\n' "$JS_SIZE" "$CSS_SIZE" "$TOTAL" > bundle-size.json
          # Human-readable helper
          fmt_kb() { echo "scale=2; $1 / 1024" | bc | sed 's/^\./0./'; }
          JS_KB=$(fmt_kb "$JS_SIZE")
          CSS_KB=$(fmt_kb "$CSS_SIZE")
          TOTAL_KB=$(fmt_kb "$TOTAL")
          # Step summary (always visible)
          {
            echo "### 📦 Bundle Size Report"
            echo "| Asset | Gzipped |"
            echo "|-------|---------|"
            echo "| JS (excl. maplibre) | ${JS_KB} KB |"
            echo "| CSS | ${CSS_KB} KB |"
            echo "| **Total** | **${TOTAL_KB} KB** |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Restore base branch bundle size
        if: github.event_name == 'pull_request'
        id: base-size
        uses: actions/cache/restore@v4
        with:
          path: base-bundle-size.json
          key: bundle-size-main-dummy
          restore-keys: bundle-size-main-

      - name: Comment bundle size delta on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const current = JSON.parse(fs.readFileSync('bundle-size.json', 'utf8'));
            const fmtKB = (b) => (b / 1024).toFixed(2);

            let body = '## 📦 Bundle Size Report\n\n';
            let hasBase = false;
            try {
              if (fs.existsSync('base-bundle-size.json')) {
                const base = JSON.parse(fs.readFileSync('base-bundle-size.json', 'utf8'));
                hasBase = true;
                const delta = (cur, prev) => {
                  const diff = cur - prev;
                  const sign = diff > 0 ? '+' : '';
                  const pct = prev > 0 ? ` (${sign}${((diff / prev) * 100).toFixed(1)}%)` : '';
                  return `${sign}${(diff / 1024).toFixed(2)} KB${pct}`;
                };
                body += '| Asset | This PR | main | Delta |\n';
                body += '|-------|---------|------|-------|\n';
                body += `| JS (excl. maplibre) | ${fmtKB(current.js)} KB | ${fmtKB(base.js)} KB | ${delta(current.js, base.js)} |\n`;
                body += `| CSS | ${fmtKB(current.css)} KB | ${fmtKB(base.css)} KB | ${delta(current.css, base.css)} |\n`;
                body += `| **Total** | **${fmtKB(current.total)} KB** | **${fmtKB(base.total)} KB** | **${delta(current.total, base.total)}** |\n`;
              }
            } catch (e) {
              // no base data available
            }

            if (!hasBase) {
              body += '| Asset | Gzipped |\n';
              body += '|-------|---------|\n';
              body += `| JS (excl. maplibre) | ${fmtKB(current.js)} KB |\n`;
              body += `| CSS | ${fmtKB(current.css)} KB |\n`;
              body += `| **Total** | **${fmtKB(current.total)} KB** |\n`;
              body += '\n> _No baseline from main yet — delta will appear on future PRs._\n';
            }

            // Upsert: find existing comment by bot, update or create
            const marker = '<!-- bundle-size-report -->';
            body = marker + '\n' + body;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Cache bundle size on main
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: bundle-size.json
          key: bundle-size-main-${{ github.sha }}
