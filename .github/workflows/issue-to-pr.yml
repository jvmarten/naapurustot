name: Implement issue with Claude

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  id-token: write

concurrency:
  group: issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  implement:
    if: github.event.label.name == 'claude'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Implement with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-6"
          prompt: |
            Implement the following GitHub issue:

            **Title:** ${{ github.event.issue.title }}

            **Description:**
            ${{ github.event.issue.body }}

            Instructions:
            1. Read CLAUDE.md for project conventions
            2. Implement the requested changes
            3. Run `npm run build` to verify it compiles
            4. Run `npm run test` to verify tests pass
            5. Run `npm run lint` to verify linting passes
            6. If you add user-visible text, add translations to both src/locales/fi.json and src/locales/en.json
            7. Commit your changes with a descriptive message referencing #${{ github.event.issue.number }}
            8. Push directly to main

      - name: Ensure changes are on main
        run: |
          # Save the current commit SHA before switching branches
          CLAUDE_COMMIT=$(git rev-parse HEAD)
          git fetch origin main
          # Check if HEAD is ahead of main (Claude pushed to a branch instead of main)
          if [ "$CLAUDE_COMMIT" != "$(git rev-parse origin/main)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout main
            git reset --hard origin/main
            git merge --no-ff "$CLAUDE_COMMIT" -m "Auto-merge issue #${{ github.event.issue.number }} into main"
            git push origin main
          fi

      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed',
              state_reason: 'completed',
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: 'Implemented and deployed to main.',
            });

