name: Implement issue with Claude

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  implement:
    if: github.event.label.name == 'claude'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create implementation branch
        id: branch
        run: |
          BRANCH="claude/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"
          git push -u origin "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Implement with Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-6"
          prompt: |
            Implement the following GitHub issue:

            **Title:** ${{ github.event.issue.title }}

            **Description:**
            ${{ github.event.issue.body }}

            Instructions:
            1. Read CLAUDE.md for project conventions
            2. Implement the requested changes
            3. Run `npm run build` to verify it compiles
            4. Run `npm run test` to verify tests pass
            5. Run `npm run lint` to verify linting passes
            6. If you add user-visible text, add translations to both src/locales/fi.json and src/locales/en.json
            7. Commit your changes with a descriptive message referencing #${{ github.event.issue.number }}
            8. Push your commits to the current branch

      - name: Verify and push changes
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="${{ steps.branch.outputs.name }}"

          # Commit any uncommitted changes
          if [ -n "$(git status --porcelain)" ]; then
            echo "Found uncommitted changes — committing them now"
            git add -A
            git commit -m "Implement #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          fi

          # Check if there are new commits vs origin/main
          git fetch origin main
          if git diff --quiet origin/main..HEAD; then
            echo "ERROR: No changes were made by Claude Code"
            exit 1
          fi

          # Push the branch (force in case action already pushed partial)
          git push origin "$BRANCH" --force-with-lease
          echo "Changes pushed to $BRANCH"
          echo "Auto-merge workflow will handle merging to main."

      - name: Close issue on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: 'Implemented on branch `${{ steps.branch.outputs.name }}`. Auto-merge will handle merging to main.',
            });

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: 'Failed to implement this issue. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.',
            });

      - name: Cleanup branch on failure
        if: failure()
        run: |
          git push origin --delete "${{ steps.branch.outputs.name }}" || true
