name: Implement issue with Claude

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  implement:
    if: github.event.label.name == 'claude'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create branch
        id: branch
        run: |
          BRANCH="claude/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"
          git push -u origin "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Implement with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Implement the following GitHub issue:

            **Title:** ${{ github.event.issue.title }}

            **Description:**
            ${{ github.event.issue.body }}

            Instructions:
            1. Read CLAUDE.md for project conventions
            2. Implement the requested changes
            3. Run `npm run build` to verify it compiles
            4. Run `npm run test` to verify tests pass
            5. Run `npm run lint` to verify linting passes
            6. If you add user-visible text, add translations to both src/locales/fi.json and src/locales/en.json
            7. Commit your changes with a descriptive message referencing #${{ github.event.issue.number }}
            8. Push to the current branch

            After pushing, a PR will be created automatically.
          use_oauth: true
          allowed_tools: "Bash,Read,Edit,Write,Glob,Grep"
          direct_prompt: true
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Create pull request
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issue.title,
              body: `Closes #${issue.number}\n\nAutomatically implemented by Claude from issue #${issue.number}.`,
              head: '${{ steps.branch.outputs.name }}',
              base: 'main',
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['automated'],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `PR created: ${pr.html_url}`,
            });
