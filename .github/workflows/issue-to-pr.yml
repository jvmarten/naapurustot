name: Implement issue with Claude

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  id-token: write

concurrency:
  group: issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  implement:
    if: github.event.label.name == 'claude'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Save pre-run commit
        id: pre
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Implement with Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-6"
          prompt: |
            Implement the following GitHub issue:

            **Title:** ${{ github.event.issue.title }}

            **Description:**
            ${{ github.event.issue.body }}

            Instructions:
            1. Read CLAUDE.md for project conventions
            2. Implement the requested changes
            3. Run `npm run build` to verify it compiles
            4. Run `npm run test` to verify tests pass
            5. Run `npm run lint` to verify linting passes
            6. If you add user-visible text, add translations to both src/locales/fi.json and src/locales/en.json
            7. Commit your changes with a descriptive message referencing #${{ github.event.issue.number }}
            8. Do NOT push — the workflow will handle merging to main

      - name: Verify changes were made
        run: |
          set -e

          PRE_SHA="${{ steps.pre.outputs.sha }}"
          echo "Pre-run commit: $PRE_SHA"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if Claude left uncommitted changes in the working tree
          if [ -n "$(git status --porcelain)" ]; then
            echo "Found uncommitted changes — committing them now"
            git add -A
            git commit -m "Implement #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          fi

          POST_SHA=$(git rev-parse HEAD)
          echo "Post-run commit: $POST_SHA"

          # Also check if the action already pushed to origin/main
          git fetch origin main
          MAIN_SHA=$(git rev-parse origin/main)
          echo "Origin main: $MAIN_SHA"

          # Determine if changes were made
          if [ "$POST_SHA" = "$PRE_SHA" ] && [ "$MAIN_SHA" = "$PRE_SHA" ]; then
            echo "ERROR: No changes were made by Claude Code"
            exit 1
          fi

          # If the action already pushed to main, we're done
          if [ "$MAIN_SHA" != "$PRE_SHA" ]; then
            echo "Changes already pushed to main by claude-code-action"
            exit 0
          fi

          # Otherwise, merge local commits into main
          CURRENT_BRANCH=$(git branch --show-current)
          if [ "$CURRENT_BRANCH" != "main" ]; then
            git checkout main
            git reset --hard origin/main
            git merge --no-ff "$POST_SHA" -m "Auto-merge issue #${{ github.event.issue.number }} into main"
            git push origin main
            git push origin --delete "$CURRENT_BRANCH" || true
          else
            git push origin main
          fi
          echo "Successfully merged into main"

      - name: Close issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed',
              state_reason: 'completed',
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: 'Implemented and merged to main.',
            });

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: 'Failed to implement this issue. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.',
            });
