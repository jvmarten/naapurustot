name: Deploy Server

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'server/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SERVER_IP }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/naapurustot
            git pull origin main
            cd server
            docker compose pull
            docker compose up -d
            echo "Deploy complete"
            docker compose ps
