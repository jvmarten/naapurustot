name: Fix automerge failures

on:
  workflow_run:
    workflows: ["Auto-merge to main"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  id-token: write

concurrency:
  group: fix-automerge-${{ github.event.workflow_run.head_branch }}

jobs:
  fix-merge-failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch
        run: echo "name=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"

      - name: Check if branch still exists
        id: check
        run: |
          if git ls-remote --exit-code origin "${{ steps.branch.outputs.name }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch failed workflow logs
        if: steps.check.outputs.exists == 'true'
        id: logs
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.payload.workflow_run.id;

            // Get the jobs for the failed run
            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });

            let errorLogs = '';
            for (const job of jobs.jobs) {
              if (job.conclusion === 'failure') {
                // Download logs for the failed job
                const { data: logData } = await github.rest.actions.downloadJobLogsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  job_id: job.id,
                });
                errorLogs += `=== Job: ${job.name} ===\n${logData}\n\n`;
              }
            }

            // Truncate to last 3000 chars to stay within reasonable prompt size
            if (errorLogs.length > 3000) {
              errorLogs = '... (truncated)\n' + errorLogs.slice(-3000);
            }

            core.setOutput('error_logs', errorLogs || 'No logs available');

      - name: Try simple rebase-merge first
        id: simple-fix
        if: steps.check.outputs.exists == 'true'
        run: |
          git clone --depth=50 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git repo
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main "${{ steps.branch.outputs.name }}"
          git checkout "${{ steps.branch.outputs.name }}"

          if git rebase origin/main; then
            git push --force-with-lease origin "${{ steps.branch.outputs.name }}"
            echo "fixed=true" >> "$GITHUB_OUTPUT"
          else
            git rebase --abort
            echo "fixed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        if: steps.check.outputs.exists == 'true' && steps.simple-fix.outputs.fixed != 'true'
        with:
          ref: ${{ steps.branch.outputs.name }}
          fetch-depth: 0

      - name: Fix merge failure with Claude Code
        if: steps.check.outputs.exists == 'true' && steps.simple-fix.outputs.fixed != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-6"
          prompt: |
            The auto-merge of branch "${{ steps.branch.outputs.name }}" into main has failed.
            A simple rebase was attempted but did not work.

            Here are the actual error logs from the failed auto-merge workflow run:

            ```
            ${{ steps.logs.outputs.error_logs }}
            ```

            Based on these logs, diagnose and fix the issue:
            1. Run `git fetch origin main` and try `git merge origin/main` to reproduce the conflict
            2. If there are merge conflicts, resolve them sensibly
            3. If the build is broken (`npm run build`), fix the build errors
            4. If tests fail (`npm run test`), fix the test failures
            5. If lint fails (`npm run lint`), fix the lint errors
            6. Commit the fixes and push to the branch

            After pushing, the auto-merge workflow will re-trigger automatically.
