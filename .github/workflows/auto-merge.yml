name: Auto-merge to main

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: write

concurrency:
  group: auto-merge-to-main

jobs:
  merge-to-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            if git merge --no-ff ${{ github.sha }} -m "Auto-merge ${GITHUB_REF_NAME} into main"; then
              if git push origin main; then
                echo "Merge and push succeeded on attempt $attempt"
                exit 0
              else
                echo "Push failed on attempt $attempt (main moved), retrying..."
                sleep 2
              fi
            else
              echo "Merge conflict on attempt $attempt"
              git merge --abort || true
              exit 1
            fi
          done

          echo "Failed after 3 attempts"
          exit 1

      - name: Delete merged branch
        if: success()
        run: git push origin --delete "${{ github.ref_name }}" || true

  deploy:
    needs: merge-to-main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --dir=dist
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
