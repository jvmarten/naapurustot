name: Auto-merge to main

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write

concurrency:
  group: auto-merge-to-main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          JS_SIZE=$(find dist/assets -name '*.js' -exec gzip -c {} \; | wc -c)
          echo "Total JS bundle (gzipped): $JS_SIZE bytes"
          if [ "$JS_SIZE" -gt 256000 ]; then
            echo "::error::JS bundle size exceeds 250KB gzipped budget ($JS_SIZE bytes)"
            exit 1
          fi

  merge-to-main:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3; do
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            if git merge --no-ff ${{ github.sha }} -m "Auto-merge ${GITHUB_REF_NAME} into main"; then
              if git push origin main; then
                echo "Merge and push succeeded on attempt $attempt"
                exit 0
              else
                echo "Push failed on attempt $attempt (main moved), retrying..."
                sleep 2
              fi
            else
              echo "Merge conflict on attempt $attempt"
              git merge --abort || true
              exit 1
            fi
          done

          echo "Failed after 3 attempts"
          exit 1

      - name: Delete merged branch
        if: success()
        run: git push origin --delete "${{ github.ref_name }}" || true

